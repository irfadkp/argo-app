apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: bugatti-shop-dev

bases:
  - ../../base/database
  - ../../base/backend
  - ../../base/frontend
  - ../../base/java-service

resources:
  - ingress.yaml
  - namespace.yaml

patchesStrategicMerge:
  # backend-patch.yaml removed - using Rollout instead of Deployment
  - frontend-patch.yaml

images:
  - name: ecommerce-backend
    newName: ghcr.io/irfadkp/bugatti-shop/backend
    newTag: "v1.0.14"
  - name: ecommerce-frontend
    newName: ghcr.io/irfadkp/bugatti-shop/frontend
    newTag: "v1.0.14"
  - name: ecommerce-java-service
    newName: ghcr.io/irfadkp/bugatti-shop/java-service
    newTag: "v1.0.14"

# Note: commonLabels removed to avoid conflicts with Argo Rollouts
# Argo Rollouts validates that service selectors match rollout selectors
# commonLabels would add environment: dev to rollout selector, causing mismatch

# Made with Bob
