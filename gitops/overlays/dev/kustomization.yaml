apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: bugatti-shop-dev

resources:
  - ../../base/database
  - ../../base/backend
  - ../../base/frontend
  - ../../base/java-service
  - ingress.yaml
  - namespace.yaml

patches:
  - target:
      kind: Deployment
      name: frontend
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1

images:
  - name: ecommerce-backend
    newName: ghcr.io/irfadkp/argo-app/backend
    newTag: "v1.0.14"
  - name: ecommerce-frontend
    newName: ghcr.io/irfadkp/argo-app/frontend
    newTag: "v1.0.14"
  - name: ecommerce-java-service
    newName: ghcr.io/irfadkp/argo-app/java-service
    newTag: "v1.0.14"

