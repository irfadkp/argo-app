apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: bugatti-shop-ingress
  annotations:
    # Remove rewrite-target to preserve the /api prefix
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
spec:
  ingressClassName: traefik
  rules:
  - host: bugatti-shop.local
    http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            # Use backend-bugatti-stable for Argo Rollouts traffic management
            # Argo Rollouts will automatically manage traffic splitting between
            # backend-bugatti-stable and backend-bugatti-canary services
            name: backend-bugatti-stable
            port:
              number: 3000
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend-bugatti
            port:
              number: 80

