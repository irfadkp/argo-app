# Canary Service - Routes traffic to canary pods
apiVersion: v1
kind: Service
metadata:
  name: backend-bugatti-canary
  labels:
    app: backend-bugatti
    shop: bugatti
spec:
  type: ClusterIP
  ports:
  - port: 3000
    targetPort: 3000
    protocol: TCP
    name: http
  selector:
    app: backend-bugatti

---
# Stable Service - Routes traffic to stable pods
apiVersion: v1
kind: Service
metadata:
  name: backend-bugatti-stable
  labels:
    app: backend-bugatti
    shop: bugatti
spec:
  type: ClusterIP
  ports:
  - port: 3000
    targetPort: 3000
    protocol: TCP
    name: http
  selector:
    app: backend-bugatti

