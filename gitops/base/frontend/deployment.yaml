apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-bugatti
  labels:
    app: frontend-bugatti
    component: ui
    shop: bugatti
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend-bugatti
  template:
    metadata:
      labels:
        app: frontend-bugatti
        component: ui
        shop: bugatti
    spec:
      containers:
      - name: frontend
        image: ecommerce-frontend:v1.0.14
        ports:
        - containerPort: 80
          name: http
        env:
        - name: API_URL
          valueFrom:
            configMapKeyRef:
              name: frontend-bugatti-config
              key: api.url
        - name: INSTANA_EUM_KEY
          valueFrom:
            configMapKeyRef:
              name: frontend-bugatti-config
              key: instana.eum.key
        - name: INSTANA_EUM_URL
          valueFrom:
            configMapKeyRef:
              name: frontend-bugatti-config
              key: instana.eum.url
        resources:
          requests:
            memory: "128Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3

