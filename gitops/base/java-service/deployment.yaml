apiVersion: apps/v1
kind: Deployment
metadata:
  name: java-service
  labels:
    app: java-service
    component: recommendations
spec:
  replicas: 2
  selector:
    matchLabels:
      app: java-service
  template:
    metadata:
      labels:
        app: java-service
        component: recommendations
    spec:
      containers:
      - name: java-service
        image: ecommerce-java-service:v1.0.14
        ports:
        - containerPort: 8080
          name: http
        env:
        - name: SPRING_PROFILES_ACTIVE
          value: production
        - name: DATABASE_HOST
          valueFrom:
            configMapKeyRef:
              name: java-service-config
              key: database.host
        - name: DATABASE_PORT
          valueFrom:
            configMapKeyRef:
              name: java-service-config
              key: database.port
        - name: DATABASE_NAME
          valueFrom:
            configMapKeyRef:
              name: java-service-config
              key: database.name
        - name: DATABASE_USER
          valueFrom:
            secretKeyRef:
              name: java-service-secret
              key: database.user
        - name: DATABASE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: java-service-secret
              key: database.password
        - name: INSTANA_ENABLED
          valueFrom:
            configMapKeyRef:
              name: java-service-config
              key: instana.enabled
        - name: INSTANA_AGENT_HOST
          valueFrom:
            fieldRef:
              fieldPath: status.hostIP
        - name: INSTANA_AGENT_PORT
          valueFrom:
            configMapKeyRef:
              name: java-service-config
              key: instana.agent.port
        - name: INSTANA_SERVICE_NAME
          valueFrom:
            configMapKeyRef:
              name: java-service-config
              key: instana.service.name
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /actuator/health/liveness
            port: 8080
          initialDelaySeconds: 60
          periodSeconds: 10
          timeoutSeconds: 5
        readinessProbe:
          httpGet:
            path: /actuator/health/readiness
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 5
          timeoutSeconds: 3

